# Electric Load + Weather + RB controller + PV + Battery Co-simulation Scenario
#
# Data flow:
#   weather_federate  → GHI, T_ext, DHR   → PV
#   Electric load      → P     → controller
#   PV → P_PV        → controller
#   controller → P_carg/dis       → battery
#
#   Setpoint is embedded as a parameter in the PID model (T_setpoint = 20 °C).

version: "1.0.0"
scenario_name: "pv_batt_SAC"
scenario_description: "Simple test case with PV, Battery, Weather, and electric Load + RL agent SAC drom stablebaseline"

start_time: "2024-01-01T00:00:00"
end_time: "2024-01-03T00:00:00"
log_level: ERROR

memory_config:
  batch_size: 1000
  attrs: "all"

synchronization:
  auto_offset:
    enabled: true
    offset_step: 0.1
    override_existing_offsets: false
  default_subscription_causality: "same_step"
  validate_causality_cycles: true
  default_startup_sync:
    enabled: true
    force_read_all_subscriptions: true
    require_updated_inputs: true
    require_finite_numeric: true
    invalid_numeric_sentinels: [-1.0e49]
    missing_inputs_policy: "warn"
    invalid_inputs_policy: "warn"


reinforcement_learning_config:
  seed: 42
  # RLAgentConfig – which agent class to load
  agent:
    model_name: "rl_simple_SACsb3"             # class inside that module
    reward_function: "models.model_catalog.RL_agents.reward_functions.soc_reward"

    env:
      observations: [federation_1.pv_federate.0.PV_power, federation_1.load_federate.0.P_load, federation_1.battery_federate.0.SOC, federation_1.battery_federate.0.P_clipped, federation_1.battery_federate.0.P_net]  # list of keys to use as observations
      observation_causality: ["same_step", "same_step", "next_step", "next_step", "next_step"]
      reset_observation_defaults:
        federation_1.pv_federate.0.PV_power: 0.0
        federation_1.load_federate.0.P_load: 0.0
        federation_1.battery_federate.0.SOC: 0.5
        federation_1.battery_federate.0.P_clipped: 0.0
        federation_1.battery_federate.0.P_net: 0.0
      force_reset_observation_defaults: true
      actions: [federation_1.battery_federate.0.Battery_power]  # list of actions
      action_spaces_type: ["box"] # list of action space types corresponding to the actions (only discrete, box) MUST have same lenght of actions for now discrete does not select the bin it is all integer bins betwen min and max
      action_boundaries: [[-8000, 8000]] # list of action space boundaries in case i do not want to retrieve from the model catalog
      # action_space_remapping: [[-10,10]] # list of action space remapping corresponding to the actions (for discrete only)
      include_prev_obs: [0,0,0,0,0]  # TODO not implementedhow many previous observations to include in the state representation (0 for none) must be None or same lenght of observations
    
    # RLHyperparametersConfig – DQN-relevant hyperparameters
    hyperparameters:
      gamma: 0.90
      learning_rate: 0.0003
      batch_size: 256
      gradient_clip: 10.0
      target_update_interval: 100

  checkpointing:
    single_best_checkpoint: "best_sac_pv_batt.pth"

  test:
    checkpoint_path: null
    total_steps: 168
    deterministic: True

  # RLTrainingConfig – core training loop settings
  training:
    mode:                 "online"   # online | offline | mixed
    episode_length:       48       # total simulation steps per episode
    n_episodes: 1000       # max agent steps before forced reset
    train_frequency: 100         # how often to perform a training step (in environment steps)
    gradient_steps: 1       # how many gradient steps to perform at each training step
    reset_mode: "rolling"  # episode reset mode: "full" (reset all to initial conditions), "soft" (keep current state), "rolling" (shift starting point forward by a specified window), "random" (reset to random conditions within defined boundaries)
    rolling_window: 10    # number of steps to shift forward for rolling reset (


    # RLReplayBufferConfig – experience replay for off-policy DQN
    replay_buffer:
      buffer_size: 100000
      prefill_steps: 10000





federations:
  federation_1:
    broker_config:
      core_type: "zmq"
      port: 23404
      host: "localhost"
      federates: 4

    federate_configs:

      # -----------------------------------------------------------------------
      # Weather federate – streams T_ext from CSV
      # -----------------------------------------------------------------------
      weather_federate:
        name: "weather_federate"
        log_level: ERROR
        type: "base"
        core_name: "fed1"
        core_type: "zmq"

        timing_configs:
          real_period: 3600   # one CSV row per 60 s sim-step

        flags:
          terminate_on_error: true
          wait_for_current_time_update: false

        connections:
          endpoints: []
          subscribes: []
          publishes:
            - key: "DryBulb"
              type: "double"
              units: "°C"
            - key: "GloHorzRad"
              type: "double"
              units: "W/m²"
            - key: "DifHorzRad"
              type: "double"
              units: "W/m²"

        model_configs:
          instantiation:
            model_name: "base_csv_reader"
            n_instances: 1
            prefix: "weather"
            parallel_execution: false

          parameters:
            csv_path: "model_catalog/physical_models/resources/weather_data_bj.csv"  # relative to model script dir
            skip_rows: 0

          init_state:
            DryBulb: 3.0
            GloHorzRad: 0.0
            DifHorzRad: 0.0

          user_defined: {}

      # -----------------------------------------------------------------------
      # PV federate
      # -----------------------------------------------------------------------
      pv_federate:
        name: "pv_federate"
        type: "base"
        core_name: "fed3"
        core_type: "zmq"
        log_level: ERROR


        timing_configs:
          real_period: 3600
          time_offset: 0.1

        flags:
          terminate_on_error: true
          wait_for_current_time_update: false

        connections:
          endpoints: []
          subscribes:
            - key: "T_ext"
              type: "double"
              units: "°C"
              targets:
                '0': [weather_federate.0/DryBulb]
            - key: "GHI"
              type: "double"
              units: "W/m²"
              targets:
                '0': [weather_federate.0/GloHorzRad]
            - key: "DHI"
              type: "double"
              units: "W/m²"
              targets:
                '0': [weather_federate.0/DifHorzRad]
          publishes:
            - key: "PV_power"
              type: "double"
              units: "W"
           

        model_configs:
          instantiation:
            model_name: "pv_dest"
            n_instances: 1
            prefix: "pv"
            parallel_execution: false

          parameters:
            lat: [39.8]
            long: [116.467]
            calc_area: [50]
            Tilt_angle: [0.6981317010]
            Azimuth_angle: [0.9]
            area_ratio: [1]
            SVF_hori: [1]
            Reflectance: [0.2]
            NOCT: [45]
            Power_rated_pv: [410]
            length: [2.05]
            width: [1.02]
            solar_constant: [1353]
            std_long: [120]

          init_state: {}

          user_defined:
            integrator: "fixed-step"

      # -----------------------------------------------------------------------
      # Battery federate
      # -----------------------------------------------------------------------
      battery_federate:
        name: "battery_federate"
        type: "base"
        core_name: "fed4"
        core_type: "zmq"
        log_level: ERROR
        timing_configs:
          real_period: 3600
          time_offset: 0.4

        flags:
          terminate_on_error: true
          wait_for_current_time_update: false

        connections:
          endpoints: []
          subscribes:
            - key: "Battery_power"
              type: "double"
              units: "W"
            - key: "P_load"
              type: "double"
              units: "W"
              targets:
                '0': [load_federate.0/P_load]
            - key: "PV_power"
              type: "double"
              units: "W"
              targets:
                '0': [pv_federate.0/PV_power]
        
      
          publishes:
            - key: "SOC"
              type: "double"
              units: "-"
            - key: "P_net"
              type: "double"
              units: "W"
            - key: "P_clipped"
              type: "double"
              units: "W"

        model_configs:
          instantiation:
            model_name: "battery_dest"
            n_instances: 1
            parallel_execution: false

          parameters:
            rated_capacity: 40000
            maximum_charge_power: 8000
            maximum_discharge_power: 8000
            SOC_upper_limit: 1.00
            SOC_lower_limit: 0.00
            charge_efficiency: 1
            discharge_efficiency: 1
            self_discharge_rate: 0
            SOC: 0.5
      

          init_state: 
            SOC: 0.5

          user_defined:
            integrator: "euler"
      
      # -----------------------------------------------------------------------
      # Load federate
      # -----------------------------------------------------------------------
      load_federate:
        name: "load_federate"
        type: "base"
        log_level: ERROR
        core_name: "fed5"
        core_type: "zmq"

        timing_configs:
          real_period: 3600
          time_offset: 0.2

        flags:
          terminate_on_error: true
          wait_for_current_time_update: false

        connections:
          endpoints: []
          subscribes: []
          publishes:
            - key: "P_load"
              type: "double"
              units: "W"

        model_configs:
          instantiation:
            model_name: "base_csv_reader"
            n_instances: 1
            prefix: "load"
            parallel_execution: false

          parameters:
            csv_path: "model_catalog/physical_models/resources/electric_load_profile_hour.csv"  # relative to model script dir
            skip_rows: 0

          init_state:
            P_load: 0.0

          user_defined:
            integrator: "fixed-step"
